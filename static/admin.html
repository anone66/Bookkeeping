<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>紫晶流水 · 管理端</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="ambient-glow ambient-glow--1" aria-hidden="true"></div>
  <div class="ambient-glow ambient-glow--2" aria-hidden="true"></div>

  <div id="view-login" class="login-shell">
    <header class="shell-header">
      <a href="/" class="brand">
        <span class="brand-mark">紫晶流水</span>
        <span class="brand-sub">管理端</span>
      </a>
      <a class="btn btn-ghost" href="/" style="font-size:0.85rem;">返回记账</a>
    </header>
    <main class="login-main">
      <div class="login-card-wrap">
        <div class="login-card-am">
          <h2>管理员登录</h2>
          <p class="login-lead">请使用具备管理员角色的账号登录，以管理用户列表与密码。</p>
          <form id="form-login" class="form">
            <div class="field">
              <span>登录名</span>
              <div class="input-wrap">
                <input type="text" name="username" required autocomplete="username" placeholder="管理员登录名" />
                <span class="material-symbols-outlined" aria-hidden="true">alternate_email</span>
              </div>
            </div>
            <div class="field">
              <span>密码</span>
              <div class="input-wrap">
                <input type="password" name="password" required autocomplete="current-password" placeholder="••••••••" class="pwd-input" />
                <button type="button" class="btn-eye material-symbols-outlined" aria-label="显示/隐藏密码" title="显示/隐藏密码">visibility_off</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">登录</button>
          </form>
          <p class="login-footer-note"><a href="/" class="muted-link">← 回到收支记账首页</a></p>
        </div>
      </div>
    </main>
  </div>

  <div id="view-admin" class="hidden">
    <header class="shell-header">
      <a href="/admin" class="brand">
        <span class="brand-mark">紫晶流水</span>
        <span class="brand-sub">用户管理</span>
      </a>
      <div class="shell-actions">
        <span id="whoami" class="whoami"></span>
        <button type="button" id="btn-theme" class="btn btn-ghost btn-icon" aria-label="切换浅色或深色主题" title="切换主题">🌙</button>
        <a class="btn btn-ghost" href="/">记账首页</a>
        <button type="button" id="btn-logout" class="btn btn-ghost">登出</button>
      </div>
    </header>

    <div class="dashboard admin-wrap">
      <header class="page-head">
        <h1>用户管理</h1>
        <p class="subtitle">创建账号 · <strong>禁用 / 启用</strong> · <strong>重置密码</strong></p>
      </header>

      <section class="admin-card">
        <h2 class="panel-title" style="margin-bottom:1.25rem;"><span style="font-family:var(--font-head); font-size:1.15rem; font-weight:700;">新建用户</span></h2>
        <form id="form-create" class="form" style="max-width: 28rem;">
          <div class="field">
            <span>登录名（3–64 位，仅字母、数字、@、.）</span>
            <input type="text" name="username" required pattern="[a-zA-Z0-9@.]{3,64}" />
          </div>
          <div class="field">
            <span>初始密码（至少 6 位，同上字符集）</span>
            <div class="input-wrap">
              <input type="password" name="password" required minlength="6" pattern="[a-zA-Z0-9@.]+" class="pwd-input" />
              <button type="button" class="btn-eye material-symbols-outlined" aria-label="显示/隐藏密码" title="显示/隐藏密码">visibility_off</button>
            </div>
          </div>
          <div class="field">
            <span>角色</span>
            <div class="select-wrap select-wrap--highlight">
              <select name="role" aria-label="新用户角色">
                <option value="user" selected>普通用户</option>
                <option value="admin">管理员</option>
              </select>
              <span class="material-symbols-outlined select-chevron" aria-hidden="true">expand_more</span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="text-transform:none; letter-spacing:0; align-self:flex-start;">创建用户</button>
        </form>
      </section>

      <section class="admin-card" style="padding:0; overflow:hidden;">
        <div style="padding: 1.25rem 1.5rem 0;">
          <h2 style="margin:0; font-family:var(--font-head); font-size:1.15rem; font-weight:700;">用户列表</h2>
        </div>
        <div class="admin-table-wrap" style="border:none; border-radius:0; box-shadow:none; margin-top:1rem;">
          <table class="admin-table" id="user-table">
            <thead>
              <tr>
                <th>编号</th>
                <th>登录名</th>
                <th>角色</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="user-tbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title" aria-hidden="true">
    <div class="modal-backdrop" id="confirm-modal-backdrop"></div>
    <div class="modal-card">
      <h3 id="confirm-modal-title"></h3>
      <p id="confirm-modal-message"></p>
      <div class="modal-actions">
        <button type="button" id="confirm-modal-cancel" class="btn btn-ghost">取消</button>
        <button type="button" id="confirm-modal-ok" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden" role="status"></div>
  <script src="/confirm.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
